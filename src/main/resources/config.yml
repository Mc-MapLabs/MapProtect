# Database type to use (Only SQLITE is currently fully supported)
database:
  type: SQLITE

# List of block types that players are NOT allowed to break in the map
protection:
  blocked-materials:
    - STONE
    - DIRT
    - GRASS_BLOCK
    - BEDROCK
    - OBSIDIAN

# Cooldown between breaking warning messages in seconds
cooldown:
  seconds: 3

# How many blocks to process per tick during the cleanup phase
# Note: 20 ticks = 1 second. Higher values clean faster but may lag the server.
performance:
  blocks-per-tick: 50
